name: Auto-merge Claude branches into dev

on:
  push:
    branches:
      - 'claude/**'

jobs:
  merge-to-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Merge into dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ github.ref_name }}
          git merge origin/${{ github.ref_name }} --no-ff --allow-unrelated-histories -X theirs -m "Auto-merge ${{ github.ref_name }}"
          git push origin dev
